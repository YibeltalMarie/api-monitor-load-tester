<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{base :: head('Something Went Wrong')}"></head>
<body>

<!--
    Spring Boot automatically serves this page when:
    - An unexpected server error occurs (500 Internal Server Error)
    - Dev B's @ControllerAdvice redirects here for unhandled exceptions

    Decisions doc Rule 2:
    - Uses th:replace to include the navbar
    - Shows friendly message — never raw error text or stack trace
    - No extra configuration needed — Spring Boot picks this up automatically
      from templates/error/500.html

    Decisions doc Rule 3:
    - Dev B's @ControllerAdvice catches exceptions and redirects here
    - Your job is only to build this page — not handle the exception
-->

<nav th:replace="~{base :: navbar}"></nav>

<main class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-10">
    <div class="flex flex-col items-center justify-center min-h-[60vh] text-center fade-up">

        <!-- Error code -->
        <div class="mb-6">
            <span class="text-8xl font-semibold text-surface-border select-none">
                500
            </span>
        </div>

        <!-- Icon -->
        <div class="h-16 w-16 rounded-2xl bg-red-500/10 border border-red-500/20
                    flex items-center justify-center mb-6">
            <svg class="h-8 w-8 text-red-400" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
            </svg>
        </div>

        <!-- Message -->
        <h1 class="text-2xl font-semibold text-white mb-3">
            Something went wrong
        </h1>
        <p class="text-slate-500 text-sm mb-8 max-w-md">
            An unexpected error occurred on our side.
            Please try again — if the problem continues,
            contact your administrator.
        </p>

        <!-- Actions -->
        <div class="flex items-center gap-3">
            <a th:href="@{/}"
               class="btn-primary inline-flex items-center gap-2">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/>
                </svg>
                Go to Dashboard
            </a>
            <button onclick="location.reload()"
                    class="inline-flex items-center gap-2 px-4 py-2 rounded-lg
                           border border-surface-border text-sm text-slate-400
                           hover:text-white hover:border-slate-500 transition-all">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/>
                </svg>
                Try again
            </button>
        </div>

    </div>
</main>

</body>
</html>
